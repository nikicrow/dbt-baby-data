version: 2

models:
  - name: stg_sleep_sessions
    description: Sleep sessions joined to profiles, with age at time of sleep.
    columns:
      - name: sleep_id
        tests: [not_null, unique]
      - name: baby_id
        tests: [not_null]
      - name: start_time
        tests: [not_null]
      - name: duration_minutes
        tests: [not_null]
      - name: age_days
        tests: [not_null]

  - name: stg_feeding_sessions
    description: Feeding sessions joined to profiles, with age at time of feed.
    columns:
      - name: feeding_id
        tests: [not_null, unique]
      - name: baby_id
        tests: [not_null]
      - name: start_time
        tests: [not_null]
      - name: feeding_type
        tests:
          - not_null
          - accepted_values:
              values: ['BREAST', 'BOTTLE', 'SOLID']

  - name: stg_diaper_events
    description: Diaper events joined to profiles, with age at time of event.
    columns:
      - name: diaper_id
        tests: [not_null, unique]
      - name: baby_id
        tests: [not_null]
      - name: event_time
        tests: [not_null]
