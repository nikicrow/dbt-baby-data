version: 2

models:
  - name: raw_diaper_events
    description: ""
    columns:
      - name: id
        data_type: uuid
        description: ""
      - name: baby_id
        data_type: uuid
        description: ""
      - name: timestamp
        data_type: timestamp without time zone
        description: ""
      - name: has_urine
        data_type: boolean
        description: ""
      - name: urine_volume
        data_type: user-defined
        description: "Enum: NONE, LIGHT, MODERATE, HEAVY"
      - name: has_stool
        data_type: boolean
        description: "Whether the diaper contained stool"
      - name: stool_consistency
        data_type: user-defined
        description: "Enum: LIQUID, SOFT, FORMED, HARD"
      - name: stool_color
        data_type: user-defined
        description: "Enum: YELLOW, BROWN, GREEN, RED, BLACK, OTHER"
      - name: diaper_type
        data_type: user-defined
        description: "Enum: DISPOSABLE, CLOTH, TRAINING"
      - name: notes
        data_type: text
        description: ""
      - name: created_at
        data_type: timestamp without time zone
        description: ""
      - name: updated_at
        data_type: timestamp without time zone
        description: ""
