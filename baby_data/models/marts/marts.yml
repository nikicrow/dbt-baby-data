version: 2

models:
  - name: fct_sleep_sessions
    description: >
      Sleep sessions classified as night (start 7pm-7am) or nap.
      Night segments are attributed to the date the night started
      (a 2am waking belongs to the previous date's night).
    columns:
      - name: sleep_id
        tests: [not_null, unique]
      - name: is_night
        tests: [not_null]
      - name: calendar_date
        tests: [not_null]

  - name: fct_wake_windows
    description: >
      Awake gaps between consecutive sleeps, daytime only (window opens
      6am-9pm), bounded to 5-360 minutes to exclude logging noise.
    columns:
      - name: baby_id
        tests: [not_null]
      - name: wake_window_minutes
        tests: [not_null]

  - name: mart_daily_metrics
    description: >
      One row per baby per day. Join babies on age_days/age_weeks for
      age-aligned comparison. Night metrics belong to the date the night
      started. The frontend Compare tab reads this table.
    columns:
      - name: baby_id
        tests: [not_null]
      - name: baby_name
        tests: [not_null]
      - name: metric_date
        tests: [not_null]
      - name: age_days
        tests: [not_null]
      - name: age_weeks
        tests: [not_null]
